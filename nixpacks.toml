# =============================================================================
# Nixpacks config — SolarMonitor PV
# Fuerza Python 3.11 y configura pip correctamente
# =============================================================================

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
cmds = ["python -m pip install -r app/backend/requirements.txt"]

[start]
cmd = "gunicorn --chdir app/backend app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
